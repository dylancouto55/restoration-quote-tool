<!--
  RESTORATION QUOTE FORM - HOSTINGER EMBED SNIPPET

  HOW TO USE:
  1. Replace YOUR-VERCEL-URL below with your actual Vercel URL
     (e.g. restoration-quote-tool-abc123.vercel.app)
  2. Choose your style: ?embed=light (recommended) or ?embed=dark
  3. Copy this entire block (iframe + script)
  4. In Hostinger Website Builder, add an "Embed" or "HTML" element to your page
  5. Paste this code in
  6. Save and publish

  The iframe auto-resizes to fit the form's height as the customer
  selects services and the form expands.
-->

<div style="max-width: 720px; margin: 0 auto;">
  <iframe
    id="restoration-quote-form"
    src="https://YOUR-VERCEL-URL.vercel.app?embed=light"
    width="100%"
    height="2400"
    frameborder="0"
    scrolling="no"
    style="border: none; display: block; width: 100%; transition: height 0.2s ease;">
  </iframe>
</div>

<script>
  (function() {
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'restoration-calculator-height') {
        var iframe = document.getElementById('restoration-quote-form');
        if (iframe && event.data.height) {
          iframe.style.height = (event.data.height + 20) + 'px';
        }
      }
    });
  })();
</script>
